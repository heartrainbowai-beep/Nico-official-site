<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第1回アニソン祭 Secret Page | Nico</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: #fff;
      text-align: center;
      background: linear-gradient(135deg, #ff8fb8 0%, #c49bff 45%, #8ed8ff 100%);
      overflow-x: hidden;
    }
    .wrap {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 22px 18px 48px;
    }
    .card {
      border: 3px solid rgba(255,255,255,.92);
      border-radius: 26px;
      overflow: hidden;
      background: rgba(255,255,255,.18);
      box-shadow: 0 0 24px rgba(255,105,180,.55);
    }
    img {
      width: 100%;
      height: auto;
      display: block;
    }
    h1 {
      margin: 18px 0 8px;
      font-size: 26px;
      line-height: 1.35;
      text-shadow: 0 0 10px rgba(255,255,255,.95), 1px 2px 4px rgba(255,65,150,.75);
    }
    p {
      margin: 0 auto 18px;
      font-size: 14px;
      line-height: 1.75;
      font-weight: 700;
      color: #fff5fb;
      text-shadow: 1px 1px 3px rgba(140,40,110,.55);
    }
    .panel {
      margin: 18px 0 0;
      padding: 18px 14px 20px;
      border-radius: 22px;
      background: rgba(255,255,255,.22);
      border: 2px solid rgba(255,255,255,.7);
      backdrop-filter: blur(6px);
    }
    input {
      width: 88%;
      max-width: 340px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 2px solid #fff;
      text-align: center;
      font-size: 17px;
      outline: none;
      color: #4a2440;
      background: rgba(255,255,255,.94);
    }
    button, .save-link {
      display: inline-block;
      margin-top: 14px;
      padding: 13px 34px;
      border-radius: 999px;
      border: 2px solid #fff;
      background: linear-gradient(45deg, #ff6faf, #ff97d2);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 6px 14px rgba(160,40,120,.28);
      cursor: pointer;
    }
    .error {
      display: none;
      margin-top: 12px;
      color: #fff;
      font-weight: 900;
    }
    #reward { display: none; margin-top: 20px; }
    .hint { font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Nico 第1回アニソン祭<br>Secret Page</h1>
    <p>来てくれてありがとう。<br>秘密のキーワードを入れると、今日の特典画像が開くよ。</p>

    <section id="cover" class="card">
      <img src="cover.jpg" alt="第1回アニソン祭 シークレットページ表紙">
    </section>

    <section class="panel" id="unlock">
      <p>秘密のキーワードを入力してね</p>
      <input id="keyword" type="text" autocomplete="off" placeholder="キーワード">
      <br>
      <button type="button" onclick="checkKeyword()">特典をひらく</button>
      <div id="error" class="error">キーワードが違うみたい…！</div>
    </section>

    <section id="reward">
      <div class="card">
        <img src="reward.jpg" alt="2026.6.6 第1回アニソン祭 来場ありがとう特典">
      </div>
      <a class="save-link" href="reward.jpg" download>画像を保存する</a>
      <p class="hint">スマホでは画像を長押しして保存してね。</p>
    </section>
  </main>

  <script>
    function normalize(value) {
      return value.trim().replace(/\s/g, "").replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      });
    }
    function checkKeyword() {
      var input = normalize(document.getElementById("keyword").value);
      var ok = ["アニソン", "あにそん"].includes(input);
      document.getElementById("error").style.display = ok ? "none" : "block";
      if (!ok) return;
      document.getElementById("reward").style.display = "block";
      document.getElementById("reward").scrollIntoView({ behavior: "smooth", block: "start" });
    }
    document.getElementById("keyword").addEventListener("keydown", function(event) {
      if (event.key === "Enter") checkKeyword();
    });
  </script>
</body>
</html>
