<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第1回ガンダム投票祭 アイコンリング特典</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: #fff;
      text-align: center;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.24), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(113,213,255,.28), transparent 28%),
        linear-gradient(145deg, #07101f 0%, #16152f 42%, #ff72b8 100%);
    }
    .wrap {
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 20px 16px 46px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(24px, 7vw, 34px);
      line-height: 1.35;
      letter-spacing: 0;
      text-shadow: 0 0 12px rgba(255,255,255,.88), 2px 3px 0 rgba(255,105,180,.55);
    }
    .festival-title {
      display: inline-block;
      white-space: nowrap;
      font-size: .9em;
    }
    .preview {
      overflow: hidden;
      border-radius: 24px;
      border: 3px solid rgba(255,255,255,.92);
      background-color: #fff;
      background-image:
        linear-gradient(45deg, rgba(255,105,180,.18) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,105,180,.18) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(113,213,255,.22) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(113,213,255,.22) 75%);
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
      box-shadow: 0 0 26px rgba(80, 190, 255, .44), 0 0 24px rgba(255, 105, 180, .34);
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 11px 24px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: linear-gradient(45deg, #ff66b7, #71d5ff);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(0,0,0,.28);
    }
    a.secondary {
      background: rgba(255,255,255,.18);
    }
    .hint {
      margin: 12px auto 0;
      font-size: 12px;
      line-height: 1.7;
      font-weight: 800;
      color: #fff7fc;
      text-shadow: 1px 1px 3px rgba(0,0,0,.46);
    }
    .save-note {
      margin: 12px auto 0;
      font-size: 15px;
      line-height: 1.7;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,.8), 1px 2px 4px rgba(255,105,180,.75);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1><span class="festival-title">第1回ガンダム投票祭</span><br>アイコンリング特典</h1>
    <section class="preview">
      <img src="reward_icon_ring.png" alt="中央が透過されたNicoアイコンリング特典">
    </section>
    <div class="actions">
      <a href="reward_icon_ring.png" download>画像を保存する</a>
      <a class="secondary" href="index.html">キーワード画面へ戻る</a>
    </div>
    <p class="save-note">スマホでは長押しでも保存できるよ♪</p>
    <p class="hint">市松模様は透過確認用の背景です。保存されるPNG本体は中央透過のままです。</p>
  </main>
</body>
</html>
