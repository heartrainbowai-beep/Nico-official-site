<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベントギャラリー | Nico</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #ff8a8e 0%, #fdbfef 28%, #91c8ff 62%, #b4ec79 100%);
      background-size: 360% 360%;
      animation: gradientBG 16s ease infinite;
      overflow-x: hidden;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .page {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 22px 16px 46px;
      text-align: center;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 18px;
      margin: 0 0 16px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.92);
      background: rgba(255,255,255,.35);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 0 12px rgba(255,255,255,.42);
    }
    .hero {
      padding: 22px 16px 18px;
      border-radius: 26px;
      border: 3px solid rgba(255,255,255,.9);
      background: rgba(255,255,255,.22);
      box-shadow: 0 0 18px rgba(255,255,255,.62), 0 0 26px rgba(255,105,180,.45);
      backdrop-filter: blur(6px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 6.8vw, 44px);
      line-height: 1.2;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,.92), 0 0 18px rgba(255,105,180,.85);
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .lead {
      width: min(100%, 560px);
      margin: 0 auto;
      color: #fff7fb;
      font-size: 14px;
      line-height: 1.8;
      font-weight: 800;
      text-shadow: 1px 1px 3px rgba(150,40,110,.36);
      overflow-wrap: anywhere;
    }
    .event-books {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin: 24px auto 0;
    }
    .event-book {
      display: block;
      overflow: hidden;
      border-radius: 24px;
      border: 3px solid rgba(255,255,255,.94);
      background: rgba(255,255,255,.24);
      box-shadow: 0 0 18px rgba(255,255,255,.58), 0 0 22px rgba(255,105,180,.42);
      color: #fff;
      text-decoration: none;
      backdrop-filter: blur(6px);
    }
    .event-book img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: rgba(255,255,255,.18);
    }
    .event-book-body {
      padding: 15px 14px 17px;
      text-align: left;
    }
    .event-book-date {
      display: inline-block;
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 900;
      color: #fff3b0;
      text-shadow: 0 0 8px rgba(255,105,180,.72);
    }
    .event-book-title {
      margin: 0 0 9px;
      font-size: 17px;
      line-height: 1.45;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,105,180,.82), 0 0 14px rgba(255,255,255,.62);
    }
    .event-book-note {
      margin: 0;
      color: #fff8fb;
      font-size: 13px;
      line-height: 1.7;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="../../">Nico公式ホームへ</a>

    <section class="hero">
      <h1>イベントギャラリー</h1>
      <p class="lead">
        Nicoのイベントで生まれた思い出を、ブックごとに残す場所です。<br>
        画像をタップすると、その日のギャラリーが開きます。
      </p>
    </section>

    <section class="event-books" aria-label="イベントギャラリー一覧">
      <a class="event-book" href="gundam-2026-06-13/">
        <img src="../../assets/event_gallery/gundam-2026-06-13/gundam_event_gallery_cover_20260614.jpg" alt="2026年6月13日 第1回ガンダム集計祭り">
        <div class="event-book-body">
          <span class="event-book-date">2026.6.13</span>
          <h2 class="event-book-title">第1回ガンダム集計祭り</h2>
          <p class="event-book-note">ランキングとセットリストの思い出を、横スライドで見られるギャラリーです。</p>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
