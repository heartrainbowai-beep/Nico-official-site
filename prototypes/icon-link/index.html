<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>透過アイコンリンク試作 | Nico</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
            color: #743154;
            background:
                radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.92), transparent 26%),
                radial-gradient(circle at 80% 10%, rgba(255, 219, 238, 0.9), transparent 24%),
                linear-gradient(160deg, #ffe6f5 0%, #ffd2ec 42%, #cbe6ff 100%);
        }
        main {
            width: min(92vw, 720px);
            margin: 0 auto;
            padding: 28px 0 42px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #9b3971;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 18px;
        }
        .panel {
            border: 2px solid rgba(255, 111, 181, 0.78);
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 18px 38px rgba(224, 91, 158, 0.22);
            overflow: hidden;
        }
        .hero {
            padding: 24px 22px 16px;
            text-align: center;
            background: linear-gradient(180deg, rgba(255, 240, 249, 0.96), rgba(255, 255, 255, 0.42));
        }
        .eyebrow {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            background: #fff3fb;
            color: #db4e9b;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0;
            border: 1px solid rgba(255, 121, 191, 0.55);
        }
        h1 {
            margin: 14px 0 8px;
            font-size: clamp(26px, 8vw, 40px);
            line-height: 1.15;
            color: #f63f9d;
            text-shadow: 0 3px 0 #fff, 0 0 14px rgba(255, 78, 166, 0.36);
            letter-spacing: 0;
        }
        .lead {
            margin: 0 auto;
            max-width: 560px;
            font-size: 15px;
            line-height: 1.9;
            font-weight: 700;
        }
        .preview-area {
            padding: 18px;
        }
        .checker {
            position: relative;
            width: min(78vw, 360px);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            border-radius: 28px;
            border: 3px solid #ff78bf;
            overflow: hidden;
            background-color: #ffffff;
            background-image:
                linear-gradient(45deg, #eecbe3 25%, transparent 25%),
                linear-gradient(-45deg, #eecbe3 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #eecbe3 75%),
                linear-gradient(-45deg, transparent 75%, #eecbe3 75%);
            background-position: 0 0, 0 16px, 16px -16px, -16px 0;
            background-size: 32px 32px;
            box-shadow: inset 0 0 0 8px rgba(255, 255, 255, 0.48);
        }
        .checker img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 18px;
        }
        .caption {
            margin: 14px auto 0;
            max-width: 560px;
            text-align: center;
            font-size: 13px;
            line-height: 1.8;
            color: #8c4770;
            font-weight: 700;
        }
        .actions {
            display: grid;
            gap: 10px;
            width: min(100%, 420px);
            margin: 20px auto 0;
        }
        .button {
            display: inline-flex;
            min-height: 52px;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.84);
            background: linear-gradient(135deg, #ff5cad, #ff8fca);
            color: #fff;
            font-weight: 900;
            text-decoration: none;
            box-shadow: 0 10px 22px rgba(224, 73, 149, 0.25);
        }
        .note-box {
            margin: 22px 18px 18px;
            padding: 16px;
            border-radius: 20px;
            background: rgba(255, 246, 252, 0.84);
            border: 1px solid rgba(255, 126, 190, 0.45);
            font-size: 13px;
            line-height: 1.85;
            font-weight: 700;
        }
        .note-box strong { color: #d94696; }
    </style>
</head>
<body>
    <main>
        <a class="back-link" href="../../">← Nico公式ホームページへ</a>
        <section class="panel" aria-labelledby="page-title">
            <div class="hero">
                <span class="eyebrow">確認用プロトタイプ</span>
                <h1 id="page-title">透過アイコンリンク試作</h1>
                <p class="lead">
                    Nicoの世界観に合わせた、ちびキャラの透過PNG素材です。
                    リスナーさんがプロフィールなどで使えるアイコンリンク素材として見えるか、試しに確認するページです。
                </p>
            </div>

            <div class="preview-area">
                <div class="checker" aria-label="市松模様の透過確認背景">
                    <img src="../../assets/prototypes/icon_link/nico_chibi_icon_link_trial_20260606.png" alt="赤髪、ピンク、マイク、虹、ハートのNico風ちびキャラ透過アイコン">
                </div>
                <p class="caption">
                    背景の市松模様が見えている部分は透明です。保存するときはスクリーンショットではなく、PNG原本のダウンロードを使う想定です。
                </p>
                <div class="actions">
                    <a class="button" href="../../assets/prototypes/icon_link/nico_chibi_icon_link_trial_20260606.png" download>PNG原本をダウンロード</a>
                </div>
            </div>

            <div class="note-box">
                <strong>試作メモ:</strong>
                これは正式な特典ページではなく、透過PNGがホームページ上でそのまま見えるかを確認するための試作品です。
                掲載場所、配布対象、デザインの雰囲気はNico確認後に決めます。
            </div>
        </section>
    </main>
</body>
</html>
